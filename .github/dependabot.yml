# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "gomod"
    target-branch: main
    directories:
      - "**/*"
    exclude-paths:
      - "azurelinux/**"
      - "centos7/**"
      - "centos8/**"
      - "coreos/**"
      - "fedora/**"
      - "flatcar/**"
      - "photon3.0/**"
      - "rhel7/**"
      - "sle15/**"
      - "ubuntu16.04/**"
      - "ubuntu18.04/**"
      - "ubuntu20.04/**"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
      day: "sunday"
    labels:
    - dependencies

  - package-ecosystem: "github-actions"
    directory: "/"
    exclude-paths:
      - "azurelinux/**"
      - "centos7/**"
      - "centos8/**"
      - "coreos/**"
      - "fedora/**"
      - "flatcar/**"
      - "photon3.0/**"
      - "rhel7/**"
      - "sle15/**"
      - "ubuntu16.04/**"
      - "ubuntu18.04/**"
      - "ubuntu20.04/**"
    schedule:
      interval: "daily"
